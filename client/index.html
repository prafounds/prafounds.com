<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Favicon: SVG (modern browsers), ICO (fallback), Apple touch icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#6366F1" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Primary SEO -->
    <title>PraFounds — Early Stage Venture Capital</title>
    <meta name="description" content="PraFounds Ventures backs technical founders at pre-seed and seed. Developer tools, infrastructure, applied AI. UK, Ireland, and Europe." />
    <link rel="canonical" href="https://www.prafounds.com/" />

    <!-- Open Graph (Google rich results, social sharing) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.prafounds.com/" />
    <meta property="og:title"       content="PraFounds — Early Stage Venture Capital" />
    <meta property="og:description" content="PraFounds Ventures backs technical founders at pre-seed and seed. Developer tools, infrastructure, applied AI. UK, Ireland, and Europe." />
    <meta property="og:image"       content="https://www.prafounds.com/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="PraFounds" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="PraFounds — Early Stage Venture Capital" />
    <meta name="twitter:description" content="Backing technical founders at pre-seed and seed. Developer tools, infrastructure, applied AI." />
    <meta name="twitter:image"       content="https://www.prafounds.com/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
